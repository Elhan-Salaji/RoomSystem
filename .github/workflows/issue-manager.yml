name: AI Issue Manager

on:
  issues:
    types: [opened]

permissions:
  contents: read
  issues: write
  projects: write

jobs:
  manage-issue:
    runs-on: ubuntu-latest
    if: github.event_name == 'issues' && github.event.issue.user.type != 'Bot'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('.github/scripts/requirements.txt') }}

      - name: Install dependencies
        run: pip install -r .github/scripts/requirements.txt

      - name: Analyze and manage issue
        run: python .github/scripts/issue_manager.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_PAT: ${{ secrets.GH_PAT }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NODE_ID: ${{ github.event.issue.node_id }}
          GITHUB_REPOSITORY: ${{ github.repository }}
