services:
  influxdb3:
    image: influxdb:3-core
    container_name: roomsystem-influxdb3
    ports:
      - "8181:8181"
    volumes:
      - influxdb3-data:/var/lib/influxdb3
    environment:
      - INFLUXDB3_NODE_ID=local-dev
    command: serve --http-bind 0.0.0.0:8181 --object-store file --data-dir /var/lib/influxdb3

volumes:
  influxdb3-data:
